name: "Tests"

on:
  push:
    branches:
      - "main"
      - "feature/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  pytest:
    name: "pytest"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v7"

      - name: "Set up Python"
        uses: "actions/setup-python@v6"
        with:
          # pytest-homeassistant-custom-component requires >=3.14, matching the
          # Python that ships with the Home Assistant container.
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: "Run pytest"
        run: pytest -q --timeout=300 -n auto
