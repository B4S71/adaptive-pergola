name: "Tests"

on:
  push:
    branches:
      - "main"
      - "feature/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  pytest:
    name: "pytest"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7

      - name: "Set up Python"
        uses: "actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1"  # v6
        with:
          # pytest-homeassistant-custom-component requires >=3.14, matching the
          # Python that ships with the Home Assistant container.
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: "Run pytest"
        run: pytest -q --timeout=300 -n auto

  ruff:
    name: "ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7

      - name: "Set up Python"
        uses: "actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1"  # v6
        with:
          python-version: "3.14"

      - name: "Install ruff"
        run: pip install "$(grep -E '^ruff' requirements-dev.txt)"

      - name: "ruff check"
        run: ruff check custom_components tests

      - name: "ruff format --check"
        run: ruff format --check custom_components tests
