name: "Create Release on Tag"

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish-release:
    name: "Create and Publish Release"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0"  # v7

      - name: "Get tag name"
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: "Create published release"
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          # Pass the tag through the environment, never interpolate ${{ }} into
          # the shell: a crafted tag like `v1.0.0$(id)` matches the v*.*.* filter
          # and the substitution would otherwise execute (ACP-012).
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Pre-release tags carry a hyphenated identifier (-beta1, -rc1, …).
          EXTRA=""
          case "$TAG" in
            *-*) EXTRA="--prerelease --latest=false" ;;
          esac

          # Check if release already exists
          RELEASE_ID=$(gh release view "$TAG" --json id -q .id 2>/dev/null || echo "")

          if [ -z "$RELEASE_ID" ]; then
            echo "Creating new published release for $TAG"
            gh release create "$TAG" \
              --title "Adaptive Pergola 🏗️☀️ $TAG" \
              --notes "Release $TAG - See full changelog below" \
              --generate-notes $EXTRA
          else
            echo "Release already exists for $TAG"
          fi

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/adaptive_pergola"
          zip adaptive_pergola.zip -r ./

      - name: "Upload the ZIP file to the release"
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            "${GITHUB_WORKSPACE}/custom_components/adaptive_pergola/adaptive_pergola.zip"
